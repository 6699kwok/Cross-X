<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Deep night sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0f2e"/>
      <stop offset="60%"  stop-color="#0d1a4a"/>
      <stop offset="100%" stop-color="#0f2460"/>
    </linearGradient>
    <!-- Bund waterfront glow -->
    <radialGradient id="glow" cx="50%" cy="72%" r="55%">
      <stop offset="0%"  stop-color="#00c6ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0f2e" stop-opacity="0"/>
    </radialGradient>
    <!-- AI line gradient -->
    <linearGradient id="aiLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00c6ff" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#00c6ff"/>
      <stop offset="70%"  stop-color="#a259ff"/>
      <stop offset="100%" stop-color="#a259ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Brand gradient for text -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#a259ff"/>
    </linearGradient>
    <filter id="glow-filter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="80"  cy="40"  r="1.2"/><circle cx="220" cy="25"  r="0.9"/>
    <circle cx="410" cy="55"  r="1.4"/><circle cx="560" cy="18"  r="0.8"/>
    <circle cx="720" cy="42"  r="1.1"/><circle cx="900" cy="30"  r="1.3"/>
    <circle cx="1050" cy="50" r="0.9"/><circle cx="1140" cy="22" r="1.5"/>
    <circle cx="150" cy="90"  r="0.7"/><circle cx="340" cy="100" r="1.0"/>
    <circle cx="650" cy="80"  r="0.8"/><circle cx="840" cy="95"  r="1.2"/>
    <circle cx="1000" cy="75" r="0.6"/><circle cx="1160" cy="100" r="0.9"/>
  </g>

  <!-- Bund skyline silhouette (simplified iconic shapes) -->
  <g fill="#0d1f5c" opacity="0.85">
    <!-- Peace Hotel (pyramid top) -->
    <polygon points="200,420 220,360 240,420"/>
    <rect x="198" y="420" width="44" height="80"/>
    <!-- Custom House (clock tower) -->
    <rect x="270" y="390" width="8"  height="110"/>
    <rect x="262" y="388" width="24" height="18"/>
    <rect x="256" y="378" width="36" height="14"/>
    <!-- Various colonial blocks -->
    <rect x="310" y="400" width="60" height="100"/>
    <rect x="380" y="380" width="45" height="120"/>
    <rect x="435" y="405" width="35" height="95"/>
    <rect x="478" y="395" width="55" height="105"/>
    <!-- Oriental Pearl Tower (right side) -->
    <line x1="900" y1="200" x2="900" y2="500" stroke="#0d1f5c" stroke-width="10"/>
    <circle cx="900" cy="310" r="35" fill="#0d1f5c"/>
    <circle cx="900" cy="390" r="22" fill="#0d1f5c"/>
    <rect x="892" y="460" width="16" height="50"/>
    <!-- Shanghai Tower (tall slim) -->
    <polygon points="980,180 972,500 988,500"/>
    <!-- SWFC (bottle opener top) -->
    <polygon points="1040,230 1032,500 1048,500"/>
    <rect x="1032" y="228" width="16" height="8"/>
    <!-- Jin Mao -->
    <polygon points="1090,260 1082,500 1098,500"/>
  </g>

  <!-- River / Huangpu reflection -->
  <rect x="0" y="500" width="1200" height="130" fill="#060e2a" opacity="0.9"/>
  <!-- Reflection shimmer lines -->
  <g stroke="#1a3a7a" stroke-width="1" opacity="0.5">
    <line x1="0" y1="515" x2="1200" y2="515"/>
    <line x1="0" y1="535" x2="1200" y2="535"/>
    <line x1="0" y1="558" x2="1200" y2="558"/>
  </g>
  <!-- City lights reflected in water -->
  <g opacity="0.25">
    <rect x="195" y="505" width="6"  height="40" fill="#ffdd88"/>
    <rect x="270" y="510" width="4"  height="30" fill="#aaddff"/>
    <rect x="312" y="508" width="8"  height="35" fill="#ffcc66"/>
    <rect x="390" y="512" width="5"  height="25" fill="#ffdd88"/>
    <rect x="895" y="505" width="10" height="45" fill="#00c6ff"/>
    <rect x="978" y="510" width="4"  height="35" fill="#a259ff"/>
    <rect x="1038" y="512" width="5" height="28" fill="#00c6ff"/>
  </g>

  <!-- AI scan line across city -->
  <rect x="0" y="440" width="1200" height="2" fill="url(#aiLine)" opacity="0.7"/>

  <!-- AI circuit nodes (subtle) -->
  <g fill="none" stroke="#00c6ff" stroke-width="1" opacity="0.3" filter="url(#glow-filter)">
    <circle cx="150" cy="200" r="4"/><line x1="154" y1="200" x2="240" y2="200"/>
    <circle cx="240" cy="200" r="4"/><line x1="240" y1="204" x2="240" y2="250"/>
    <circle cx="240" cy="250" r="3"/>
    <circle cx="1050" cy="180" r="4"/><line x1="1046" y1="180" x2="960" y2="180"/>
    <circle cx="960" cy="180" r="4"/><line x1="960" y1="184" x2="960" y2="240"/>
    <circle cx="960" cy="240" r="3"/>
  </g>

  <!-- Main headline -->
  <text x="600" y="220" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="82" font-weight="800" letter-spacing="-2"
        fill="url(#brand)" filter="url(#glow-filter)">Cross X</text>

  <!-- Sub-headline -->
  <text x="600" y="285" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="28" font-weight="400" letter-spacing="6"
        fill="#a0b8e0">AI TRAVEL CONCIERGE FOR CHINA</text>

  <!-- Divider line -->
  <line x1="440" y1="308" x2="760" y2="308" stroke="url(#aiLine)" stroke-width="1.5"/>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif" font-size="16" fill="#c8d8f0">
    <rect x="310" y="328" width="130" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#00c6ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="375" y="351" text-anchor="middle">Hotels</text>

    <rect x="460" y="328" width="130" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#00c6ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="525" y="351" text-anchor="middle">Restaurants</text>

    <rect x="610" y="328" width="130" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#a259ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="675" y="351" text-anchor="middle">Itineraries</text>

    <rect x="760" y="328" width="130" height="34" rx="17" fill="#ffffff" fill-opacity="0.06" stroke="#a259ff" stroke-width="1" stroke-opacity="0.4"/>
    <text x="825" y="351" text-anchor="middle">Book Now</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="470" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="19" font-weight="300" letter-spacing="1"
        fill="#7090b8">Describe your trip in one sentence. Get a complete plan instantly.</text>

  <!-- URL badge -->
  <rect x="490" y="488" width="220" height="30" rx="15" fill="#ffffff" fill-opacity="0.07"/>
  <text x="600" y="509" text-anchor="middle"
        font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-size="14" font-weight="500" letter-spacing="2" fill="#00c6ff">crossx.ai</text>
</svg>
